<script>
// ── LOCKDOWN: must run BEFORE any other scripts ──
// Force all shadow DOM to be "open" so we can reach inside Twitter's widget
// to sandbox its iframe. Without this, Twitter uses closed shadow DOM and
// we can't touch the iframe at all.
(function() {
  const _attachShadow = Element.prototype.attachShadow;
  Element.prototype.attachShadow = function(init) {
    return _attachShadow.call(this, Object.assign({}, init, { mode: 'open' }));
  };

  // Block ALL popups globally — nothing should open a new window
  window.open = function() { return null; };

  // Prevent the page itself from navigating away
  window.addEventListener('beforeunload', function(e) {
    e.preventDefault();
    e.returnValue = '';
    return '';
  });
})();
</script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface-hover: #24242f;
  --surface-active: #2e2e3a;
  --border: #2a2a36;
  --text: #e8e6f0;
  --text-dim: #9896a8;
  --accent: #6c63ff;
  --accent-glow: rgba(108,99,255,0.25);
  --green: #4ade80;
  --orange: #fb923c;
  --red: #f87171;
  --radius: 12px;
  --radius-sm: 8px;
}

html { font-size: 16px; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Top Bar ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  background: rgba(15,15,19,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.topbar h1 {
  font-family: 'Fraunces', serif;
  font-size: 1.35rem;
  letter-spacing: -0.02em;
  white-space: nowrap;
}
.topbar h1 span { color: var(--accent); }
.search-box {
  flex: 1; max-width: 400px;
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font: inherit; font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: '⌕';
  position: absolute; left: 12px; top: 10px;
  color: var(--text-dim); font-size: 1.1rem;
  pointer-events: none;
}
.search-pills {
  display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap;
}
.search-pill {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
  transition: all 0.15s;
  font-family: inherit;
}
.search-pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.search-pill:hover:not(.active) {
  border-color: var(--text-dim);
}
.spacer { flex: 1; }
.kid-toggle {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
  font-size: 0.85rem; color: var(--text-dim);
  white-space: nowrap;
}
.kid-toggle input { display: none; }
.kid-toggle .switch {
  width: 40px; height: 22px;
  background: var(--surface-active);
  border-radius: 11px;
  position: relative;
  transition: background 0.25s;
}
.kid-toggle .switch::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--text-dim);
  top: 3px; left: 3px;
  transition: transform 0.25s, background 0.25s;
}
.kid-toggle input:checked + .switch {
  background: var(--green);
}
.kid-toggle input:checked + .switch::after {
  transform: translateX(18px);
  background: #fff;
}

/* ── Layout ── */
.container { padding: 24px 20px 60px; max-width: 1200px; margin: 0 auto; }

/* ── Category Grid ── */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}
.cat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
  text-align: center;
}
.cat-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 4px 20px var(--accent-glow);
}
.cat-card.active {
  border-color: var(--accent);
  background: var(--surface-hover);
  box-shadow: 0 0 0 2px var(--accent-glow);
}
.cat-card .icon { font-size: 1.8rem; margin-bottom: 6px; }
.cat-card .name { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; }
.cat-card .count { font-size: 0.75rem; color: var(--text-dim); }
.cat-card .video-badge {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 4px;
}
.cat-card.hidden { display: none; }

/* ── Section Header ── */
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}
.section-header h2 {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem;
  letter-spacing: -0.02em;
}
.section-header .badge {

  border-radius: 20px;
  font-size: 0.8rem;
  color: var(--text-dim);
}
.back-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 6px 14px;
  font: inherit; font-size: 0.85rem;

  transition: background 0.15s;
}
.back-btn:hover { background: var(--surface-hover); }

/* ── Item Grid ── */
.item-grid {

  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));

}
.item-card {

.item-card:hover {

.item-thumb {

.item-body { padding: 12px 14px; }
.item-body .text {

<script>
const { categories, items } = SITE_DATA;

const LS_FAV = 'bookmarksLibKids:favourites:v1';
const LS_RECENT = 'bookmarksLibKids:recent:v1';
const RECENT_CAP = 80;
const KID_BUILD = SITE_DATA.kid_build === true;
const LUCKY_RECENT_MS = 4000;

let currentCat = null;
let kidMode = false;
let searchQuery = '';
let modalOpenItemId = null;
const searchScopes = { text: true, author: true, tags: false, whole: true };

let luckyDipActive = false;
let luckyHistory = [];
let luckyHistoryIndex = 0;
let luckyDipRecentTimer = null;

const $ = id => document.getElementById(id);
const byNormUrl = new Map();

function normUrl(raw) {
  if (!raw || typeof raw !== 'string') return '';
  const trimmed = raw.trim();
  if (!trimmed) return '';
  try {
    const u = new URL(trimmed);
    u.search = '';
    u.hash = '';
    let host = u.hostname.toLowerCase();
    if (host === 'twitter.com' || host === 'www.twitter.com') u.hostname = 'x.com';
    else if (host === 'mobile.twitter.com' || host === 'm.twitter.com') u.hostname = 'x.com';
    else if (host === 'www.x.com') u.hostname = 'x.com';
    let out = u.toString();
    if (out.endsWith('/') && u.pathname !== '/') out = out.slice(0, -1);
    return out;
  } catch {
    return '';
  }
}

function rebuildUrlIndex() {
  byNormUrl.clear();
  for (const i of items) {
    const k = normUrl(i.url);
    if (k) byNormUrl.set(k, i);
  }
}
rebuildUrlIndex();

function loadJson(key, fallback) {
  try {
    const s = localStorage.getItem(key);
    if (s == null) return fallback;
    return JSON.parse(s);
  } catch {
    return fallback;
  }
}

function saveJson(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    console.warn('localStorage save failed', key, e);
  }
}

function pruneStoredUserData() {
  const favsRaw = loadJson(LS_FAV, []);
  const favArr = Array.isArray(favsRaw) ? favsRaw : [];
  const favKeys = favArr.map(normUrl).filter(Boolean);
  const nextFav = [];
  const seenF = new Set();
  let favChanged = !Array.isArray(favsRaw) || favArr.length !== favKeys.length;
  for (const k of favKeys) {
    if (!byNormUrl.has(k)) { favChanged = true; continue; }
    if (seenF.has(k)) { favChanged = true; continue; }
    seenF.add(k);
    nextFav.push(k);
  }
  if (nextFav.length !== favKeys.length) favChanged = true;

  const recentRaw = loadJson(LS_RECENT, []);
  const nextRecent = [];
  const seenR = new Set();
  let recentChanged = !Array.isArray(recentRaw);
  const arr = Array.isArray(recentRaw) ? recentRaw : [];
  for (const e of arr) {
    const k = normUrl(e && e.u);
    if (!k || !byNormUrl.has(k)) { recentChanged = true; continue; }
    if (seenR.has(k)) { recentChanged = true; continue; }
    seenR.add(k);
    nextRecent.push({ u: k, t: typeof e.t === 'number' ? e.t : Date.now() });
  }
  if (nextRecent.length !== arr.length) recentChanged = true;

  if (favChanged) saveJson(LS_FAV, nextFav);
  if (recentChanged) saveJson(LS_RECENT, nextRecent);
}

function getFavouriteKeys() {
  pruneStoredUserData();
  return loadJson(LS_FAV, []);
}

function isFavourite(url) {
  const k = normUrl(url);
  if (!k) return false;
  return getFavouriteKeys().includes(k);
}

function toggleFavourite(url) {
  const k = normUrl(url);
  if (!k) return;
  pruneStoredUserData();
  let favs = loadJson(LS_FAV, []);
  const idx = favs.indexOf(k);
  if (idx >= 0) favs.splice(idx, 1);
  else favs.push(k);
  saveJson(LS_FAV, favs);
}

function recordRecent(url) {
  const k = normUrl(url);
  if (!k) return;
  pruneStoredUserData();
  let entries = loadJson(LS_RECENT, []);
  if (!Array.isArray(entries)) entries = [];
  entries = entries.filter(e => normUrl(e.u) !== k);
  entries.unshift({ u: k, t: Date.now() });
  if (entries.length > RECENT_CAP) entries = entries.slice(0, RECENT_CAP);
  saveJson(LS_RECENT, entries);
}

function getRecentKeysOrdered() {
  pruneStoredUserData();
  const entries = loadJson(LS_RECENT, []);
  if (!Array.isArray(entries)) return [];
  return entries.map(e => normUrl(e.u)).filter(Boolean);
}

function itemPassesKidMode(i) {
  if (!kidMode) return true;
  if (i.risque) return false;
  const cat = categories.find(c => c.slug === i.category);
  return cat && cat.kid_safe !== false;
}

function visibleCountFromUrlKeys(keys) {
  let list = keys.map(k => byNormUrl.get(k)).filter(Boolean);
  if (kidMode) list = list.filter(itemPassesKidMode);
  return list.length;
}

function toggleScope(el) {
  const scope = el.dataset.scope;
  searchScopes[scope] = !searchScopes[scope];
  el.classList.toggle('active', searchScopes[scope]);
  // Re-trigger search if there's a query
  if (searchQuery) $('searchInput').dispatchEvent(new Event('input'));
}

function matchesQuery(str, q) {
  if (!str) return false;
  if (searchScopes.whole) {
    try {
      return new RegExp('\\b' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i').test(str);
    } catch { return str.toLowerCase().includes(q.toLowerCase()); }
  }
  return str.toLowerCase().includes(q.toLowerCase());
}

function itemMatchesSearch(i, q) {
  if (searchScopes.text && matchesQuery(i.text, q)) return true;
  if (searchScopes.author && (matchesQuery(i.handle, q) || matchesQuery(i.author, q))) return true;
  if (searchScopes.tags && (i.tags.some(t => matchesQuery(t, q)) || matchesQuery(i.category, q))) return true;
  return false;
}

// ── Helpers ──
function fmtDuration(s) {
  if (!s) return '';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
  catch { return ''; }
}

function videoSrcEncoded(path) {
  if (!path) return '';
  return path.split('/').map(encodeURIComponent).join('/');
}

function videoMime(path) {
  const p = (path || '').toLowerCase();
  if (p.endsWith('.webm')) return 'video/webm';
  if (p.endsWith('.mkv')) return 'video/x-matroska';
  return 'video/mp4';
}

function pickRandomFrom(arr) {
  if (!arr || arr.length === 0) return null;
  return arr[Math.floor(Math.random() * arr.length)];
}

function luckyPoolItemsSource() {
  return items.filter(i => itemPassesKidMode(i));
}

function buildLuckyDipPool() {
  const recentSet = new Set(getRecentKeysOrdered());
  return luckyPoolItemsSource().filter(i => !recentSet.has(normUrl(i.url)));
}

function pickFromOldestHalf() {
  const raw = loadJson(LS_RECENT, []);
  if (!Array.isArray(raw) || raw.length === 0) return null;
  const n = raw.length;
  const k = Math.max(1, Math.floor(n / 2));
  const slice = raw.slice(-k);
  const seen = new Set();
  const candidates = [];
  for (const e of slice) {
    const u = normUrl(e && e.u);
    if (!u) continue;
    const it = byNormUrl.get(u);
    if (!it) continue;
    if (!itemPassesKidMode(it)) continue;
    if (seen.has(it.id)) continue;
    seen.add(it.id);
    candidates.push(it);
  }
  return pickRandomFrom(candidates);
}

function pickLuckyDipItem() {
  const pool = buildLuckyDipPool();
  if (pool.length > 0) {
    return { item: pickRandomFrom(pool), hint: '' };
  }
  const fromHalf = pickFromOldestHalf();
  if (fromHalf) {
    return { item: fromHalf, hint: "You've seen these before — here's an older favourite!" };
  }
  const any = pickRandomFrom(luckyPoolItemsSource());
  if (any) {
    return { item: any, hint: "Nothing new right now — here's a pick from the library." };
  }
  return { item: null, hint: '' };
}

function scheduleLuckyDipRecent(url) {
  if (luckyDipRecentTimer) clearTimeout(luckyDipRecentTimer);
  const k = normUrl(url);
  if (!k) return;
  luckyDipRecentTimer = setTimeout(() => {
    luckyDipRecentTimer = null;
    recordRecent(k);
  }, LUCKY_RECENT_MS);
}

function cancelLuckyDipDebounce() {
  if (luckyDipRecentTimer) {
    clearTimeout(luckyDipRecentTimer);
    luckyDipRecentTimer = null;
  }
}

function flushLuckyDipRecent() {
  if (!luckyDipActive) return;
  cancelLuckyDipDebounce();
  const item = items.find(i => i.id === modalOpenItemId);
  if (item) recordRecent(item.url);
}

function endLuckyDipState() {
  cancelLuckyDipDebounce();
  luckyDipActive = false;
  luckyHistory = [];
  luckyHistoryIndex = 0;
  const mod = $('modal');
  if (mod) mod.classList.remove('lucky-dip-immersive');
  const h = $('luckyDipFallbackHint');
  if (h) {
    h.classList.remove('show');
    h.textContent = '';
  }
  const pre = $('luckyPreload');
  if (pre) {
    pre.removeAttribute('src');
  }
}

function syncLuckyDipChrome() {
  if (!luckyDipActive) return;
  const back = $('luckyBack');
  if (back) back.disabled = luckyHistoryIndex <= 0;
}

function scheduleLuckyDipPreload() {
  if (!luckyDipActive) return;
  const pre = $('luckyPreload');
  if (!pre) return;
  const { item } = pickLuckyDipItem();
  if (item && item.video_path) {
    pre.preload = 'auto';
    pre.src = videoSrcEncoded(item.video_path);
  } else {
    pre.removeAttribute('src');
  }
}

function startLuckyDip() {
  const { item, hint } = pickLuckyDipItem();
  if (!item) {
    alert('No bookmarks available for Lucky Dip yet.');
    return;
  }
  luckyDipActive = true;
  luckyHistory = [item.id];
  luckyHistoryIndex = 0;
  const hintEl = $('luckyDipFallbackHint');
  if (hintEl) {
    if (hint) {
      hintEl.textContent = hint;
      hintEl.classList.add('show');
    } else {
      hintEl.classList.remove('show');
      hintEl.textContent = '';
    }
  }
  openItem(item.id, { skipRecent: true });
  queueMicrotask(() => {
    const n = $('luckyNext');
    if (n) n.focus();
  });
}

function luckyDipBack() {
  if (!luckyDipActive) return;
  cancelLuckyDipDebounce();
  if (luckyHistoryIndex <= 0) return;
  luckyHistoryIndex -= 1;
  const h = $('luckyDipFallbackHint');
  if (h) h.classList.remove('show');
  openItem(luckyHistory[luckyHistoryIndex], { skipRecent: true });
}

function luckyDipNext() {
  if (!luckyDipActive) return;
  cancelLuckyDipDebounce();
  if (luckyHistoryIndex < luckyHistory.length - 1) {
    luckyHistory = luckyHistory.slice(0, luckyHistoryIndex + 1);
  }
  const { item, hint } = pickLuckyDipItem();
  if (!item) {
    alert('No more bookmarks available.');
    return;
  }
  const hintEl = $('luckyDipFallbackHint');
  if (hintEl) {
    if (hint) {
      hintEl.textContent = hint;
      hintEl.classList.add('show');
    } else {
      hintEl.classList.remove('show');
      hintEl.textContent = '';
    }
  }
  luckyHistory.push(item.id);
  luckyHistoryIndex = luckyHistory.length - 1;
  openItem(item.id, { skipRecent: true });
}

// ── Category Grid ──
function renderCategories() {
  const grid = $('catGrid');
  pruneStoredUserData();
  const favKeys = loadJson(LS_FAV, []);
  const recentEntries = loadJson(LS_RECENT, []);
  const recentKeys = Array.isArray(recentEntries)
    ? recentEntries.map(e => normUrl(e.u)).filter(Boolean)
    : [];
  const nf = visibleCountFromUrlKeys(favKeys);
  const nr = visibleCountFromUrlKeys(recentKeys);
  const luckyCard = KID_BUILD
    ? `<div class="cat-card" onclick="startLuckyDip()">
      <div class="icon">🎲</div>
      <div class="name">Lucky Dip</div>
      <div class="count">Random fun</div>
    </div>`
    : '';
  const virtual = `
    <div class="cat-card" onclick="selectCategory('__recent__')">
      <div class="icon">🕐</div>
      <div class="name">Recently viewed</div>
      <div class="count">${nr} saved</div>
    </div>
    <div class="cat-card" onclick="selectCategory('__fav__')">
      <div class="icon">⭐</div>
      <div class="name">Favourites</div>
      <div class="count">${nf} saved</div>
    </div>${luckyCard}`;
  grid.innerHTML = virtual + categories.map(c => {
    const hidden = kidMode && !c.kid_safe ? 'hidden' : '';
    const videoBadge = c.video_count > 0
      ? `<span class="video-badge">${c.video_count} with preview</span>`
      : '';
    return `
      <div class="cat-card ${hidden}" onclick="selectCategory('${c.slug}')">
        <div class="icon">${c.icon}</div>
        <div class="name">${c.name}</div>
        <div class="count">${c.count} bookmarks ${videoBadge}</div>
      </div>`;
  }).join('');
}

// ── Items Grid ──
function selectCategory(slug) {
  currentCat = slug;
  if (slug === '__recent__') {
    $('sectionTitle').textContent = '🕐 Recently viewed';
  } else if (slug === '__fav__') {
    $('sectionTitle').textContent = '⭐ Favourites';
  } else {
    const cat = categories.find(c => c.slug === slug);
    if (!cat) return;
    $('sectionTitle').textContent = `${cat.icon} ${cat.name}`;
  }
  $('catGrid').style.display = 'none';
  $('itemsView').style.display = 'block';
  renderItems();
}

function showCategories() {
  currentCat = null;
  $('catGrid').style.display = '';
  $('itemsView').style.display = 'none';
  $('searchInput').value = '';
  searchQuery = '';
  renderCategories();
}

function renderItems() {
  let filtered;
  if (currentCat === '__fav__') {
    const keys = getFavouriteKeys();
    filtered = keys.map(k => byNormUrl.get(k)).filter(Boolean);
  } else if (currentCat === '__recent__') {
    const keys = getRecentKeysOrdered();
    filtered = keys.map(k => byNormUrl.get(k)).filter(Boolean);
  } else {
    filtered = items.filter(i => i.category === currentCat);
  }

  if (kidMode) filtered = filtered.filter(itemPassesKidMode);
  if (searchQuery) {
    filtered = filtered.filter(i => itemMatchesSearch(i, searchQuery));
  }

  $('sectionCount').textContent = `${filtered.length} items`;

  if (filtered.length === 0) {
    $('itemGrid').innerHTML = '';
    $('emptyState').style.display = '';
    return;
  }
  $('emptyState').style.display = 'none';

  const favSet = new Set(getFavouriteKeys());
  $('itemGrid').innerHTML = filtered.map(item => {
    let thumbHtml;
    if (item.thumb_path) {
      thumbHtml = `<img src="${item.thumb_path}" alt="" loading="lazy">`;
    } else {
      const cat = categories.find(c => c.slug === item.category);
      thumbHtml = `<span class="placeholder">${cat ? cat.icon : '📌'}</span>`;
    }
    const playBadge = item.has_video
      ? '<span class="play-badge">▶ VIDEO</span>'
      : '<span class="play-badge">▶ View</span>';
    const dur = '';
    const tagHtml = item.tags.map(t => {
      const tc = categories.find(c => c.slug === t);
      return `<span class="tag">${tc ? tc.name : t}</span>`;
    }).join('');
    const fav = favSet.has(normUrl(item.url));

    return `
      <div class="item-card" onclick="openItem(${item.id})">
        <div class="item-thumb">
          ${thumbHtml}${playBadge}${dur}
          <button type="button" class="item-fav-star${fav ? ' on' : ''}" onclick="toggleFavouriteFromCard(event, ${item.id})" aria-label="Toggle favourite">${fav ? '★' : '☆'}</button>
        </div>
        <div class="item-body">
          <div class="text">${escHtml(item.text || '(no description)')}</div>
          <div class="meta">
            <span>@${escHtml(item.handle)}</span>
            <span>${fmtDate(item.date)}</span>
          </div>
          ${tagHtml ? `<div class="tags">${tagHtml}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function refreshItemGrid() {
  if (currentCat === '__search__') {
    if (searchQuery.length >= 2) {
      const q = searchQuery.toLowerCase();
      const matching = items.filter(i =>
        (!kidMode || !i.risque) &&
        (!kidMode || categories.find(c => c.slug === i.category)?.kid_safe !== false) &&
        itemMatchesSearch(i, q)
      );
      renderSearchResults(matching);
    }
  } else if (currentCat) {
    renderItems();
  }
}

function toggleFavouriteFromCard(ev, id) {
  ev.stopPropagation();
  const item = items.find(i => i.id === id);
  if (!item) return;
  toggleFavourite(item.url);
  refreshItemGrid();
  syncModalFavButton();
}

function toggleFavouriteModal() {
  const item = items.find(i => i.id === modalOpenItemId);
  if (!item) return;
  toggleFavourite(item.url);
  syncModalFavButton();
  refreshItemGrid();
}

function syncModalFavButton() {
  const btn = $('modalFavBtn');
  const item = items.find(i => i.id === modalOpenItemId);
  if (!item) {
    btn.classList.remove('on');
    btn.textContent = '☆';
    return;
  }
  const on = isFavourite(item.url);
  btn.classList.toggle('on', on);
  btn.textContent = on ? '★' : '☆';
}

// ── Open Item ──
function extractTweetId(url) {
  const m = url.match(/\/status\/(\d+)/);
  return m ? m[1] : null;
}

function openItem(id, options = {}) {
  const skipRecent = options.skipRecent === true;
  const item = items.find(i => i.id === id);
  if (!item) return;

  modalOpenItemId = id;
  if (!skipRecent) {
    recordRecent(item.url);
  } else if (luckyDipActive) {
    cancelLuckyDipDebounce();
    scheduleLuckyDipRecent(item.url);
  }

  const modalEl = $('modal');
  if (luckyDipActive) {
    modalEl.classList.add('lucky-dip-immersive');
  } else {
    modalEl.classList.remove('lucky-dip-immersive');
  }

  if (item.has_video && item.video_path) {
    $('modalTitle').textContent = item.text || '';
    $('modalAuthor').textContent = `@${item.handle} · ${fmtDate(item.date)}`;
    $('modalLink').innerHTML = '<span style="color:var(--text-dim);font-size:0.8rem">Local library video</span>';
    const vsrc = videoSrcEncoded(item.video_path);
    const vmime = videoMime(item.video_path);
    $('modalPlayer').innerHTML = `<video controls autoplay playsinline><source src="${vsrc}" type="${vmime}"></video>`;
    syncModalFavButton();
    if (currentCat === '__recent__') renderItems();
    modalEl.classList.add('open');
    document.body.style.overflow = 'hidden';
    syncLuckyDipChrome();
    if (luckyDipActive) {
      const ann = $('luckyDipAnnouncer');
      if (ann) {
        const t = item.text || 'bookmark';
        ann.textContent = 'Lucky dip — now showing: ' + t.slice(0, 200);
      }
      scheduleLuckyDipPreload();
    }
    return;
  }

  const tweetId = extractTweetId(item.url);
  $('modalTitle').textContent = item.text || '';
  $('modalAuthor').textContent = `@${item.handle}`;
  $('modalLink').innerHTML = '';
  syncModalFavButton();
  if (currentCat === '__recent__') renderItems();

  const player = $('modalPlayer');
  player.innerHTML = `<div class="embed-loading"><div class="spinner"></div><p>Loading post…</p></div>`;

  modalEl.classList.add('open');
  document.body.style.overflow = 'hidden';
  syncLuckyDipChrome();
  if (luckyDipActive) {
    const ann = $('luckyDipAnnouncer');
    if (ann) {
      const t = item.text || 'bookmark';
      ann.textContent = 'Lucky dip — now showing: ' + t.slice(0, 200);
    }
    scheduleLuckyDipPreload();
  }

  if (tweetId && typeof twttr !== 'undefined' && twttr.widgets) {
    player.innerHTML = '';
    twttr.widgets.createTweet(tweetId, player, {
      theme: 'dark',
      align: 'center',
      dnt: true,
      conversation: 'none',
    }).then(el => {
      if (!el) {
        showEmbedFallback(player, item);
      } else {
        // Immediately scan the new widget for iframes to sandbox
        scanForIframes(player);
        // Re-scan after a short delay in case the iframe loads lazily
        setTimeout(() => scanForIframes(player), 500);
        setTimeout(() => scanForIframes(player), 2000);
      }
      $('modalTitle').textContent = '';
      $('modalAuthor').textContent = '';
    }).catch(() => {
      showEmbedFallback(player, item);
    });
  } else {
    showEmbedFallback(player, item);
  }
}

function showEmbedFallback(container, item) {
  const thumbHtml = item.thumb_path
    ? `<img src="${escHtml(item.thumb_path)}" style="max-width:100%;border-radius:8px;margin-bottom:12px">`
    : '';
  container.innerHTML = `<div class="embed-fallback">
    ${thumbHtml}
    <p style="margin-top:8px;color:var(--text);line-height:1.5">${escHtml(item.text || '')}</p>
    <p style="margin-top:12px;font-size:0.8rem">@${escHtml(item.handle)}</p>
  </div>`;
}

function reallyCloseModal() {
  if (luckyDipActive) {
    flushLuckyDipRecent();
  }
  endLuckyDipState();
  modalOpenItemId = null;
  const modalEl = $('modal');
  modalEl.classList.remove('open');
  modalEl.classList.remove('lucky-dip-immersive');
  $('modalPlayer').innerHTML = '';
  $('modalTitle').textContent = '';
  $('modalAuthor').textContent = '';
  $('modalLink').innerHTML = '';
  document.body.style.overflow = '';
}

function closeModal() {
  if (document.fullscreenElement) {
    const p = document.exitFullscreen();
    if (p && typeof p.then === 'function') {
      p.then(() => reallyCloseModal()).catch(() => reallyCloseModal());
    } else {
      reallyCloseModal();
    }
    return;
  }
  reallyCloseModal();
}

  if (currentCat && currentCat !== '__search__') {
    renderItems();
  } else {
    if (searchQuery.length >= 2) {
      const q = searchQuery.toLowerCase();
      const matching = items.filter(i =>

        itemMatchesSearch(i, q)
      );
      currentCat = '__search__';
      $('sectionTitle').textContent = '🔍 Search Results';
      $('catGrid').style.display = 'none';
      $('itemsView').style.display = 'block';

    } else {
      if (currentCat === '__search__') showCategories();
    }
  }
});

  if (filtered.length === 0) {

  $('emptyState').style.display = 'none';
  const favSet = new Set(getFavouriteKeys());
  $('itemGrid').innerHTML = filtered.map(item => {

    if (item.thumb_path) {

    } else {

    }
    const playBadge = item.has_video
      ? '<span class="play-badge">▶ VIDEO</span>'
      : '<span class="play-badge">▶ View</span>';

    return `
      <div class="item-card" onclick="openItem(${item.id})">
        <div class="item-thumb">${thumbHtml}${playBadge}
          <button type="button" class="item-fav-star${fav ? ' on' : ''}" onclick="toggleFavouriteFromCard(event, ${item.id})" aria-label="Toggle favourite">${fav ? '★' : '☆'}</button>
        </div>
        <div class="item-body">
          <div class="text">${escHtml(item.text || '(no description)')}</div>
          <div class="meta">
            <span>@${escHtml(item.handle)} · ${cat ? cat.name : ''}</span>
            <span>${fmtDate(item.date)}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

const kidModeEl = $('kidMode');
if (kidModeEl && kidModeEl.tagName === 'INPUT' && kidModeEl.type === 'checkbox') {
  kidModeEl.addEventListener('change', e => {
    kidMode = e.target.checked;
    if (currentCat && currentCat !== '__search__') {
      const cat = categories.find(c => c.slug === currentCat);
      if (cat && !cat.kid_safe) showCategories();
      else renderItems();
    } else {
      showCategories();
    }
  });
}

$('modal').addEventListener('click', e => {
  if (e.target === $('modal')) closeModal();
});

document.addEventListener('keydown', e => {
  if (!$('modal').classList.contains('open')) return;
  if (e.key === 'Escape') {
    e.preventDefault();
    closeModal();
    return;
  }
  if (!luckyDipActive) return;
  const t = e.target;
  const typing = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA');
  if (e.key === 'ArrowRight' || e.key === 'n' || e.key === 'N') {
    if (typing) return;
    e.preventDefault();
    luckyDipNext();
    return;
  }
  if (e.key === 'ArrowLeft' || e.key === 'p' || e.key === 'P') {
    if (typing) return;
    e.preventDefault();
    luckyDipBack();
  }
});

// ── Aggressive iframe lockdown ──
// Twitter's embed creates iframes inside shadow DOM. We forced shadow DOM
// open (in the <head> script) so we can now reach in and sandbox them.
const SAFE_SANDBOX = 'allow-scripts allow-same-origin allow-forms';

function sandboxIframe(iframe) {
  if (iframe._locked) return;
  iframe.setAttribute('sandbox', SAFE_SANDBOX);
  iframe._locked = true;
}

function scanForIframes(root) {
  // Find all iframes in this root
  root.querySelectorAll?.('iframe')?.forEach(sandboxIframe);
  // Traverse into any open shadow roots
  root.querySelectorAll?.('*')?.forEach(el => {
    if (el.shadowRoot) {
      scanForIframes(el.shadowRoot);
      // Also observe inside shadow roots for dynamically added iframes
      observeRoot(el.shadowRoot);
    }
  });
}

const observedRoots = new WeakSet();

function observeRoot(root) {
  if (observedRoots.has(root)) return;
  observedRoots.add(root);
  const obs = new MutationObserver(() => scanForIframes(root));
  obs.observe(root, { childList: true, subtree: true });
}

// Observe the main document
observeRoot(document.body);

// Periodic fallback scan — catches anything MutationObserver missed
setInterval(() => scanForIframes(document.body), 1500);

// Block ALL link clicks to X domains on the parent page
document.addEventListener('click', e => {
  const a = e.target.closest('a');
  if (!a) return;
  const href = a.getAttribute('href') || '';
  if (href.includes('twitter.com') || href.includes('x.com') || href.includes('t.co')) {
    e.preventDefault();
    e.stopPropagation();
  }
}, true);

// ── Init ──
renderCategories();
</script>
</body>
</html>
